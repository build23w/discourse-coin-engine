en:
  site_settings:
    coin_engine_enabled: |
      Master switch for the coin engine plugin. When false, all endpoints 404 and all jobs no-op.

      <strong>📋 Manual Payments admin page</strong>: <a href="/admin/coin-engine">/admin/coin-engine</a> — full UI for issuing manual payments, viewing recent payments, and adding Solana transaction signatures after on-chain mint. Admin-only, gated by the same auth as this Settings page.
    coin_engine_coin_name: "Display name for the community coin shown in widgets and emails. Default '$RENO'."
    coin_engine_coin_symbol: "Single-character symbol for the coin (e.g. '$', '⊙'). Default '$'."
    coin_engine_brand_color: "Hex color used as the brand accent in email templates. Default LF orange."
    coin_engine_welcome_topic_id: "Topic ID for the coin welcome guide. Linked from widgets and emails."
    coin_engine_ledger_topic_id: "Topic ID for the public payment ledger. Linked from widgets and emails."
    coin_engine_tier_thresholds: "Pipe-separated coin thresholds for each tier. Must match tier_names length."
    coin_engine_tier_names: "Pipe-separated tier names. Must match tier_thresholds length."
    coin_engine_solana_field_id: "Discourse user_field ID for the Solana wallet address."
    coin_engine_max_earn_per_hour: "Anti-abuse cap on coins earnable per user per hour. 0 disables the cap."
    coin_engine_emails_enabled: "Master switch for ALL coin engine email jobs. Must be true for any individual digest to send."
    coin_engine_email_sender_name: "Display name shown as the sender on all coin engine emails (the 'friendly from'). Leave blank to default to the Site Contact Username (site_contact_username), then the site title. Set this to stop digests showing the bare email local-part as the sender."
    coin_engine_weekly_digest_enabled: "Send weekly leaderboard digest emails Mondays."
    coin_engine_weekly_digest_top_n: "How many top users to include in the leaderboard digest."
    coin_engine_personal_recap_enabled: "Send each user a personal weekly recap of their earnings, rank delta, and new badges."
    coin_engine_streak_warning_enabled: "Email users whose visit streak is at risk of breaking today."
    coin_engine_streak_warning_min_days: "Minimum streak length before sending a warning. Avoids nagging brand-new users."
    coin_engine_dormant_reengage_enabled: "Email dormant users a 'here's what you missed' digest weekly."
    coin_engine_dormant_days_threshold: "User is considered dormant after N days without a visit."
    coin_engine_tier_up_email_enabled: "Send a real-time email when a user crosses a tier threshold."
    coin_engine_disable_core_digests: "Suppress Discourse's built-in activity-summary digest emails while coin engine emails are enabled, so all engagement email flows through the coin engine (throttled, geo-scoped). Core digests resume the moment this or the email master switch is turned off."
    coin_engine_geo_digest_enabled: "Scope digest emails (daily top picks, dormant re-engage) to each user's profile location - own city first, then nearby cities, then province. Users with no location get the site-wide digest. Located users with no local content are skipped rather than emailed off-area topics."
    coin_engine_geo_digest_window_days: "Lookback window (days) for geo-scoped digest topic selection. Wider than the site-wide 48h window because local content is sparser."
    coin_engine_email_click_reward_enabled: "Wrap digest links in signed one-time tokens that credit the recipient a small coin reward on click-through (max once per user per day) and record per-city funnel stats at /admin/coin-engine/email_stats.json."
    coin_engine_email_click_reward: "Coins credited when a user clicks through from an engagement email. 0 disables the reward but keeps click tracking."
    coin_engine_local_weekly_enabled: "Weekly 'Your area this week' roundup topics: for each city with enough located members, auto-publish the hottest local threads. Linked from geo digests and welcome PMs."
    coin_engine_local_weekly_min_users: "Minimum located members a city needs before it gets a weekly roundup topic."
    coin_engine_local_weekly_max_cities: "Maximum cities per weekly run (largest member counts first)."
    coin_engine_local_weekly_category_id: "Fallback category for roundup topics when no category matches the city or province name. 0 = poster default."
    coin_engine_local_weekly_username: "Username that authors the weekly roundups. Blank = Site Contact Username, then system."
    coin_engine_local_welcome_enabled: "PM new members (from the site contact) with the most active threads near their location, or a pointer to the location quest when unset. One PM per user ever."
    coin_engine_local_welcome_daily_cap: "Safety cap on welcome PMs per daily run."
    coin_engine_location_quest_enabled: "Expose the 'set your location' onboarding quest (client widget reads this; server validates the claim either way)."
    coin_engine_streak_freeze_email_cta_enabled: "Add a one-click 'freeze your streak' button to streak-warning emails (signed token; same cost/cap rules as the FAB flow)."
    coin_engine_stake2earn_enabled: "Stake2Earn bridge: read the Meteora M3M3 top-staker list on-chain, verify which forum members are staking, and expose /coin-engine/stake2earn/* plus the Staker Boost."
    coin_engine_m3m3_program_id: "Meteora stake-for-fee (M3M3) program ID. Reference only - reads go through the vault address."
    coin_engine_m3m3_vault: "M3M3 FeeVault address for the community token. The staker set is decoded from this vault's TopStakerList account."
    coin_engine_m3m3_api_base: "Meteora stake-for-fee API base URL (display stats only; staker truth comes from the chain)."
    coin_engine_meteora_stake_url: "Public URL where holders stake on Meteora. Shown as the 'Stake on Meteora' CTA in the Stake2Earn tab and withdraw flow. Blank hides the CTA."
    coin_engine_solana_archive_rpc_url: "Archive-capable RPC for treasury transaction history (the transparency page). The default public RPC is fine at 15-min cache."
    coin_engine_staker_boost_enabled: "Pay verified on-chain stakers a daily multiplier top-up on everything they earned in the forum the previous day."
    coin_engine_staker_boost_multiplier: "Staker Boost multiplier. 1.5 = stakers effectively earn 1.5x. Bonus = (multiplier - 1) x previous-day earnings."
    coin_engine_staker_boost_daily_cap: "Hard cap on the daily boost bonus per user. 0 = uncapped."
    coin_engine_webhook_url: "Optional outbound webhook URL. Coin engine events POST here when this is set."
    coin_engine_webhook_events: "Comma-separated event types to post to the webhook. Options: tier_up, airdrop, milestone, weekly_digest_sent."
    coin_engine_custom_titles: "Pipe-separated display titles, one per tier. Must match tier_thresholds length. Shown on public profile, user card, and embed badge."
    coin_engine_public_profile_enabled: "Enable the SEO-rich public profile page at /coin-engine/u/:username. Indexable by search engines."
    coin_engine_embed_badge_enabled: "Enable the embeddable tier badge at /coin-engine/embed/u/:username (HTML, SVG, JSON formats)."
    coin_engine_streak_calendar_enabled: "Show the GitHub-style streak heatmap in the FAB Stats tab."
    coin_engine_themed_week_enabled: "Master toggle for the Themed Week event (banner, endpoint, and per-post bonus credits)."
    coin_engine_themed_week_name: "Currently active themed week display name (e.g. 'Kitchen Week'). Empty disables the themed-week banner."
    coin_engine_themed_week_tagline: "Short tagline shown under the themed week name."
    coin_engine_themed_week_hashtag: "Hashtag promoted with the themed week (e.g. 'KitchenWeek2026')."
    coin_engine_themed_week_category_id: "Category ID that the themed-week multiplier applies to. 0 disables category targeting."
    coin_engine_themed_week_multiplier: "Reward multiplier on actions in the themed category (e.g. 1.5 = 50% bonus)."
    coin_engine_themed_week_ends_at: "ISO-8601 datetime when the themed week ends. Used for the live countdown."
    coin_engine_goals_enabled: "Allow users to set personal monthly $RENO goals in the Stats tab."
    coin_engine_max_monthly_goal: "Maximum allowed monthly goal a user can set. Prevents pathological values."
    coin_engine_animated_ring_min_tier: "Minimum tier index (0-based) at which animated tier rings appear around avatars."
    coin_engine_show_rank_in_user_card: "Show the user's overall rank in the popup user card."

  discourse_coin_engine:
    weekly_digest:
      subject: "Top earners on %{site_name} this week"
      title: "This week on %{site_name}"
      intro: "Here's the leaderboard for the past 7 days. Top earners, hot topics, and where you stand."
      your_rank_unchanged: "Your rank: #%{rank}"
      your_rank_up: "Your rank: #%{rank} (up %{delta} this week)"
      your_rank_down: "Your rank: #%{rank} (down %{delta} this week)"
    personal_recap:
      subject: "Your weekly %{coin} recap"
      earned_this_week: "You earned %{amount} %{coin} this week"
      new_badges: "New badges unlocked"
      streak: "Current streak: %{days} days"
    streak_warning:
      subject: "Don't break your %{days}-day streak"
      body: "You haven't logged in today. Visit %{site_name} now to keep your %{days}-day visit streak alive."
    dormant_reengage:
      subject: "Here's what you missed on %{site_name}"
      intro: "It's been a while. Here are the most active conversations from the past week and the quests you can finish in 5 minutes."
    tier_up:
      subject: "You reached %{tier} tier on %{site_name}"
      body: "Congrats. You've earned enough %{coin} to reach %{tier} tier."
    airdrop:
      subject: "%{amount} %{coin} airdropped to your account"
      body: "An airdrop of %{amount} %{coin} has been credited to your %{site_name} account. Reason: %{reason}"
    manual_payment:
      subject: "+%{amount} %{coin} -- receipt #%{payment_id}"
  coin_engine:
    title: "Coin Engine"
    coin_engine_squad_hq_enabled: "Give enabled squads their own HQ subcategory (public read, members post) once they hit the member threshold."
    coin_engine_squad_hq_parent_category_id: "Parent category that squad HQ subcategories are created under."
    coin_engine_squad_hq_min_members: "Members a squad needs before its HQ subcategory is created."
    coin_engine_weekly_recap_topic_enabled: "Post a public 'Top Builders of the week' recap topic every week."
    coin_engine_weekly_recap_category_id: "Category for the weekly Top Builders recap topic (0 = disabled)."
